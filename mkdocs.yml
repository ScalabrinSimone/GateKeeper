site_name: GateKeeper Docs

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - toc.integrate
    - content.code.copy
    - content.tabs.link
    - search.highlight
    - search.suggest

  palette:
    - scheme: slate
      primary: black
      accent: cyan

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.details
  - pymdownx.tabbed
  - pymdownx.highlight
  - pymdownx.arithmatex


nav:
  - Home: index.md
  - Panoramica:
    - Idea: panoramica/idea.md
    - Architettura: panoramica/architettura.md
    - Componenti: panoramica/componenti.md
  - Guida Utente:
    - Installazione: guida-utente/installazione.md
    - Primo avvio: guida-utente/primo-avvio.md
    - Notifiche: guida-utente/notifiche.md
  - Parte Tecnica:
    - Backend: parte-tecnica/backend.md
    - Database: parte-tecnica/database.md
    - Hardware: parte-tecnica/hardware.md
    - Sicurezza: parte-tecnica/sicurezza.md
  - Sviluppo:
    - Roadmap: sviluppo/roadmap.md
  - Problemi:
    - Panoramica: problemi/index.md
    - Flutter e Figma: problemi/flutter-figma.md
    - Assistenza AI: problemi/ai-assistance.md
    - Sfide Tecniche: problemi/challenges-solutions.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ScalabrinSimone/GateKeeper.git
    - icon: fontawesome/brands/discord
      link: https://discord.gg/jARTvAt8Kh

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js

