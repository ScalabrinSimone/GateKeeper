name: gatekeeper_app
description: "GateKeeper Flutter app for smart home RFID/BLE monitoring."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Routing dichiarativo: gestisce deep link, redirect e ShellRoute
  go_router: ^14.6.3

  # SVG rendering (loghi, icone esportate da Figma)
  flutter_svg: ^2.0.10

  # Internazionalizzazione
  intl: any

  # Animazioni avanzate: FadeIn, SlideY, ScaleIn ecc.
  # Si usa con .animate() extension sulle widget.
  flutter_animate: ^4.5.0

  # Feedback aptico nativo (vibrazione).
  # HapticFeedback di Flutter copre solo light/medium/heavy;
  # vibration permette durata e pattern personalizzati.
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  generate: true

  # TODO: aggiungere qui gli asset SVG/PNG esportati da Figma.
  assets:
    - assets/icons/
    - assets/images/
