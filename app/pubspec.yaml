name: gatekeeper_app
description: "GateKeeper Flutter app for smart home RFID/BLE monitoring."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.2.2
  flutter_svg: ^2.2.0
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  # TODO: aggiungere qui gli asset SVG/PNG esportati da Figma.
  assets:
    - assets/icons/
    - assets/images/